name: Multi-Platform Build Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-frontend:
    # ... (existing frontend job)
    name: Build Frontend (React)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install & Build
        run: |
          cd frontend-react
          npm install
          npm run build
      - name: Upload Frontend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend-react/dist

  build-android:
    name: Build Android (APK)
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download Frontend Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend-react/dist
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Capacitor & Sync
        run: |
          npm install
          npx cap sync android
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WITS-Android-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

  build-desktop:
    name: Build Desktop (Win, Linux, Mac)
    needs: build-frontend
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Download Frontend Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend-react/dist
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install & Build Electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm install
          npx cap sync electron
          cd electron
          npm install
          npm run build && npx electron-builder build -c ./electron-builder.config.json -p never
      - name: Upload Desktop Binaries
        uses: actions/upload-artifact@v4
        with:
          name: WITS-Desktop-${{ matrix.os }}
          path: |
            electron/dist/*.exe
            electron/dist/*.dmg
            electron/dist/*.AppImage
            electron/dist/*.deb
            electron/dist/*.zip

  build-ios:
    name: Build iOS (IPA)
    needs: build-frontend
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download Frontend Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend-react/dist
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install & Sync iOS
        run: |
          npm install
          npx cap sync ios
      - name: Build iOS
        run: |
          echo "Building for iOS Simulator to bypass code signing requirements in CI."
          xcodebuild -project ios/App/App.xcodeproj -scheme App -configuration Debug -sdk iphonesimulator -derivedDataPath Build CODE_SIGNING_ALLOWED=NO CODE_SIGN_IDENTITY=""
          cd Build/Build/Products/Debug-iphonesimulator
          zip -r WITS-iOS-Simulator.zip App.app
      - name: Upload iOS Build
        uses: actions/upload-artifact@v4
        with:
          name: WITS-iOS-Simulator
          path: Build/Build/Products/Debug-iphonesimulator/WITS-iOS-Simulator.zip

  publish-release:
    name: Publish Release
    needs: [build-android, build-desktop, build-ios]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          draft: false
          prerelease: false
          files: |
            release-artifacts/WITS-Android-Debug/*.apk
            release-artifacts/WITS-Desktop-windows-latest/*.exe
            release-artifacts/WITS-Desktop-macos-latest/*.dmg
            release-artifacts/WITS-Desktop-macos-latest/*.zip
            release-artifacts/WITS-Desktop-ubuntu-latest/*.AppImage
            release-artifacts/WITS-Desktop-ubuntu-latest/*.deb
            release-artifacts/WITS-iOS-Simulator/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
