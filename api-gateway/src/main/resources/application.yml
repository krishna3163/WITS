server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
      routes:
        - id: chat-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/messages/**, /api/conversations/**
          filters:
            - JwtAuthFilter
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20

        - id: feed-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/feed/**
          filters:
            - JwtAuthFilter

        - id: wallet-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/wallet/**
          filters:
            - JwtAuthFilter

        - id: miniapp-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/miniapps/**

        - id: websocket-chat
          uri: ws://localhost:8082
          predicates:
            - Path=/ws-chat/**
