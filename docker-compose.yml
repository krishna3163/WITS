version: '3.8'

services:
  wits-app:
    build: .
    ports:
      - "8081:8081"
    environment:
      - DB_URL=jdbc:postgresql://postgres:5432/wits_db
      - DB_USER=postgres
      - DB_PASSWORD=password
      - SPRING_PROFILES_ACTIVE=prod
      - MONGODB_URI=mongodb://mongodb:27017/wits_db
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_started
    networks:
      - wits-network

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=wits_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wits_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - wits-network

  mongodb:
    image: mongo:6
    environment:
      - MONGO_INITDB_DATABASE=wits_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    networks:
      - wits-network

volumes:
  postgres-data:
  mongodb-data:

networks:
  wits-network:
    driver: bridge