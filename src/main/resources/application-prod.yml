spring:
  application:
    name: WITS

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/wits_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/wits_db}

server:
  port: ${PORT:8082}

vaadin:
  launch-browser: false
  productionMode: true