spring:
  application:
    name: WITS

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/wits_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8081

vaadin:
  launch-browser: false
